  tier_3:
    name: "Fast"
    intelligence: 6
    cost: low
    models:
      claude-code:
        - claude-haiku-4-5
      cursor:
        - auto
    aliases: [haiku, fast]

  tier_4:
    name: "Lightweight"
    intelligence: 4
    cost: minimal
    models:
      claude-code:
        - x-ai/grok-4.1-fast
        - gemini-3-flash
