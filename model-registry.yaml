# Model Tier Registry (aligned with pragma-agent)
# Skills may use model_tier: tier_2 instead of hardcoding model names.

tiers:
  tier_1:
    name: "Frontier reasoning"
    intelligence: 10
    cost: high
    models:
      claude-code:
        - claude-opus-4-6
        - x-ai/grok-4
      cursor:
        - composer-2
        - gpt-5.4-xhigh
    aliases: [opus, frontier, reasoning]

  tier_2:
    name: "Capable"
    intelligence: 8
    cost: medium
