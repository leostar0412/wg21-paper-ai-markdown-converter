name: Paper ingestion (URL to Markdown)

on:
  workflow_dispatch:
    inputs:
      workflow_config_json:
        description: >
          Full workflow JSON (optional if repo secret WORKFLOW_CONFIG_JSON is set).
          Prefer the secret for API keys — it is masked in logs; this input still appears on the run summary page.
        required: false
        type: string

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc

      # Required when workflow JSON uses claude_code (author invokes `claude`).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "$(npm prefix -g)/bin" >> "$GITHUB_PATH"

      # Required when workflow JSON uses cursor.api_key (reviewer invokes `agent`).
      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Sync Python environment
        run: uv sync --all-extras
        working-directory: ${{ github.workspace }}

      # Config source (first match wins): repo secret WORKFLOW_CONFIG_JSON (masked in logs as ***)
      # else workflow_dispatch input read from GITHUB_EVENT_PATH (not passed via env).
      - name: Write workflow config
        env:
          WORKFLOW_CONFIG_JSON: ${{ secrets.WORKFLOW_CONFIG_JSON }}
        run: |
          python3 << 'PY'
          import json, os, pathlib, sys

          out = pathlib.Path("/tmp/workflow_config.json")
          secret = (os.environ.get("WORKFLOW_CONFIG_JSON") or "").strip()
          if secret:
              out.write_text(secret, encoding="utf-8")
              raise SystemExit(0)
          ev_path = os.environ.get("GITHUB_EVENT_PATH")
          if not ev_path:
              print("Set repository secret WORKFLOW_CONFIG_JSON or provide workflow_config_json input.", file=sys.stderr)
              sys.exit(1)
          with open(ev_path, encoding="utf-8") as f:
              ev = json.load(f)
          raw = (ev.get("inputs") or {}).get("workflow_config_json") or ""
          if not str(raw).strip():
              print("Set repository secret WORKFLOW_CONFIG_JSON or provide workflow_config_json input.", file=sys.stderr)
              sys.exit(1)
          out.write_text(str(raw), encoding="utf-8")
          PY

      - name: Run url2md
        id: run
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          uv run python url2md.py \
            --config-file /tmp/workflow_config.json \
            --repo-root "${{ github.workspace }}" \
            --quiet
        working-directory: ${{ github.workspace }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-ingestion-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            temp/ingestion_run_*/result.json
            temp/ingestion_run_*/logs.json
            temp/ingestion_run_*/outputs/bundle.zip
          if-no-files-found: warn
          retention-days: 90
